# espanso match file

# For a complete introduction, visit the official docs at: https://espanso.org/docs/

# You can use this file to define the base matches (aka snippets)
# that will be available in every application when using espanso.

# Matches are substitution rules: when you type the "trigger" string
# it gets replaced by the "replace" string.

# yaml-language-server: $schema=https://raw.githubusercontent.com/espanso/espanso/dev/schemas/match.schema.json

matches:
  # Simple text replacement
  - trigger: "-ceo"
    word: true
    replace: |
      WhatsApp: +91 9741 552 552
      Mobile: +65 86462570
  - trigger: "-trd"
    word: true
    replace: |
      Thanks & Regards,
      Anand
  - trigger: "-td"
    word: true
    replace: |
      Thanks
      Anand
  - trigger: "-rd"
    word: true
    replace: |
      Regards
      Anand

  # NOTE: espanso uses YAML to define matches, so pay attention to the indentation!
  # But matches can also be dynamic:

  # Print the current date
  - trigger: "-date"
    word: true
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%Y-%m-%d"

  - trigger: "-isodate"
    word: true
    replace: "{{myisodate}}"
    vars:
      - name: myisodate
        type: date
        params:
          format: "%FT%T%:z"

  - trigger: "-rfcdate"
    word: true
    replace: "{{myrfcdate}}"
    vars:
      - name: myrfcdate
        type: date
        params:
          format: "%a, %d %b %Y %T GMT"

  - trigger: "-codex"
    word: true
    force_clipboard: true
    replace: |
      <!--
      cd $PWD
      dev.sh -- codex --yolo --model gpt-5.6-sol --config model_reasoning_effort=medium
      -->

  - trigger: "-claude"
    word: true
    force_clipboard: true
    replace: |
      <!--
      cd $PWD
      dev.sh -- claude --dangerously-skip-permissions --model opus --effort medium
      -->

  - trigger: "-copilot"
    word: true
    force_clipboard: true
    replace: |
      <!--
      cd $PWD
      dev.sh -- copilot --yolo --model claude-sonnet-4.6
      -->

  # Print the output of a shell command
  - trigger: ":shell"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo 'Hello from your shell'"

  # And much more! For more information, visit the docs: https://espanso.org/docs/
